name: public-safe audit + tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest pandas

      - name: Run public-safe audit
        # Fails the build if ANY denylisted string sneaks into the repo
        # (internal hostnames, real Connect GUIDs, key fragments, etc).
        run: python _audit.py

      - name: Run test suite
        run: python -m pytest tests/ -v

